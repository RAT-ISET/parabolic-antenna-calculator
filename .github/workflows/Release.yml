name: Release
on:
  push:
    tags:
      - "v*"
    branches:
      - main

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release
          -DCPACK_WIX_UPGRADE_GUID=${{ vars.PACKAGE_GUID }}

      - name: Build
        run: cmake --build build --config Release --target install

      - name: Install the Tools
        uses: RAT-ISET/release-action/pack/tools@main

      - name: Package
        working-directory: build
        run: cpack -C Release

      - name: EXPack
        uses: RAT-ISET/release-action/pack/expack@main
        with:
          code_sign_key: ${{ secrets.CODE_SIGN_KEY }}
          code_sign_crt: ${{ secrets.CODE_SIGN_CRT }}
          pass: ${{ secrets.PASS }}
          gpg_key: ${{ secrets.GPG_KEY }}
          out_path: ${{ github.workspace }}
          intermediate_crt: ${{ secrets.INTERMEDIATE_CRT }}

      - name: Info Output
        run: find out/dist -type f
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ runner.os }}
          path: out/dist/*
          compression-level: '0'

  upload:
    if: false
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub Release
        run: echo "TODO"